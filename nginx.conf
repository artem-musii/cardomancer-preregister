server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript image/svg+xml application/json;

    # SPA-style fallback (also fine for a single page)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # long-cache fingerprint-free static assets
    location ~* \.(?:css|js|woff2?|otf|png|jpe?g|webp|webm|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # never cache the HTML shell
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
